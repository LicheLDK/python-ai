# =============================================================================
# AI SaaS Framework — Staging Compose (T-12.01)
# Spec: docs/SDS.md §12 | docs/SECURITY_HARDENING.md | docs/RUNBOOK_DEPLOY.md
# =============================================================================
# Usage:
#   Copy .env.staging.example → .env.staging  (fill placeholders; never commit secrets)
#   docker compose -f docker-compose.staging.yml --env-file .env.staging up --build -d
#   docker compose -f docker-compose.staging.yml --env-file .env.staging --profile tools run --rm migrate
#   docker compose -f docker-compose.staging.yml --env-file .env.staging --profile tools run --rm seed
#
# Differs from local docker-compose.yml:
#   - project name aisaas-staging (isolated volumes/network)
#   - APP_ENV=staging (Secure cookies on)
#   - Postgres/Redis NOT published to host (internal network only)
#   - API/Web on 18000 / 13000 to coexist with local 8000/3000
#   - one-shot migrate + seed profiles
# =============================================================================

name: aisaas-staging

x-backend-env: &backend-env
  APP_ENV: staging
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-aisaas}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_saas}
  REDIS_URL: redis://redis:6379/0
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  STORAGE_PATH: /data/storage
  JWT_SECRET: ${JWT_SECRET}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-15}
  REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-7}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:13000}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  AI_PRIMARY_PROVIDER: ${AI_PRIMARY_PROVIDER:-openai}
  AI_FALLBACK_PROVIDER: ${AI_FALLBACK_PROVIDER:-gemini}
  AI_FALLBACK_ENABLED: ${AI_FALLBACK_ENABLED:-false}
  AI_RATE_LIMIT_MAX: ${AI_RATE_LIMIT_MAX:-30}
  AI_RATE_LIMIT_WINDOW_SECONDS: ${AI_RATE_LIMIT_WINDOW_SECONDS:-60}
  OCR_LANG: ${OCR_LANG:-korean+en}
  OCR_MAX_PAGES: ${OCR_MAX_PAGES:-20}
  OCR_MAX_ATTEMPTS: ${OCR_MAX_ATTEMPTS:-3}
  OCR_RETRY_BASE_SECONDS: ${OCR_RETRY_BASE_SECONDS:-2}
  OCR_RECONCILE_ENABLED: ${OCR_RECONCILE_ENABLED:-true}
  OCR_STALE_QUEUED_SECONDS: ${OCR_STALE_QUEUED_SECONDS:-180}
  OCR_STALE_RUNNING_SECONDS: ${OCR_STALE_RUNNING_SECONDS:-1200}
  UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-10485760}
  STATS_MATERIALIZE_ENABLED: ${STATS_MATERIALIZE_ENABLED:-true}
  STATS_SUMMARY_CACHE_SECONDS: ${STATS_SUMMARY_CACHE_SECONDS:-300}
  SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
  SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
  SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-}

services:
  postgres:
    image: postgres:16-alpine
    container_name: aisaas-stg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aisaas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.staging}
      POSTGRES_DB: ${POSTGRES_DB:-ai_saas}
    # No host ports — staging DB stays on the compose network only.
    volumes:
      - stg_pgdata:/var/lib/postgresql/data
    networks:
      - stg_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: aisaas-stg-redis
    restart: unless-stopped
    volumes:
      - stg_redisdata:/data
    networks:
      - stg_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    command: ["redis-server", "--appendonly", "yes"]

  migrate:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: aisaas-stg-migrate
    profiles: ["tools"]
    environment:
      <<: *backend-env
    volumes:
      - stg_storage:/data/storage
    networks:
      - stg_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "alembic", "upgrade", "head"]
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: aisaas-stg-seed
    profiles: ["tools"]
    environment:
      <<: *backend-env
    volumes:
      - stg_storage:/data/storage
    networks:
      - stg_net
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "python -m app.scripts.seed_admin && python -m app.scripts.seed_prompts",
      ]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: aisaas-stg-api
    restart: unless-stopped
    environment:
      <<: *backend-env
    ports:
      - "${STAGING_API_PORT:-18000}:8000"
    volumes:
      - stg_storage:/data/storage
    networks:
      - stg_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: aisaas-stg-worker
    restart: unless-stopped
    command: ["arq", "app.workers.settings.WorkerSettings"]
    environment:
      <<: *backend-env
    volumes:
      - stg_storage:/data/storage
    networks:
      - stg_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: aisaas-stg-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:18000}
    ports:
      - "${STAGING_WEB_PORT:-13000}:3000"
    networks:
      - stg_net
    depends_on:
      - api

volumes:
  stg_pgdata:
    name: aisaas_stg_pgdata
  stg_redisdata:
    name: aisaas_stg_redisdata
  stg_storage:
    name: aisaas_stg_storage

networks:
  stg_net:
    name: aisaas_stg_net
    driver: bridge
