# =============================================================================
# AI SaaS Framework — Docker Compose
# Tasks: T-0.03 … T-0.09, T-3.02 (storage), T-4.02 (worker)
# Spec: docs/SDS.md §12.1 | docs/TASKS.md | usage.md
# =============================================================================
# Services:
#   - postgres (PostgreSQL 16)
#   - redis (Redis 7)
#   - api (FastAPI) + storage_data volume at STORAGE_PATH (or S3 via STORAGE_BACKEND)
#   - worker (ARQ; same image as api, different command)
#   - web (Next.js shell)
# Optional profiles: ollama, minio
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: aisaas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aisaas
      POSTGRES_PASSWORD: aisaas
      POSTGRES_DB: ai_saas
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - aisaas_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisaas -d ai_saas"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: aisaas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - aisaas_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    command: ["redis-server", "--appendonly", "yes"]

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: aisaas-api
    restart: unless-stopped
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://aisaas:aisaas@postgres:5432/ai_saas
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      STORAGE_PATH: /data/storage
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      # Host Ollama by default; with profile `ollama` use http://ollama:11434
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    ports:
      - "8000:8000"
    volumes:
      - storage_data:/data/storage
    networks:
      - aisaas_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: aisaas-worker
    restart: unless-stopped
    command: ["arq", "app.workers.settings.WorkerSettings"]
    env_file:
      - .env.example
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://aisaas:aisaas@postgres:5432/ai_saas
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      STORAGE_PATH: /data/storage
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - storage_data:/data/storage
    networks:
      - aisaas_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Optional local LLM (Phase 13). Start with:
  #   docker compose --profile ollama up -d ollama
  # then: docker exec aisaas-ollama ollama pull llama3.2
  ollama:
    image: ollama/ollama:latest
    container_name: aisaas-ollama
    profiles: ["ollama"]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - aisaas_net

  # Optional S3-compatible storage (Phase 14). Start with:
  #   docker compose --profile minio up -d minio minio-init
  # then set STORAGE_BACKEND=s3 and S3_* in .env (see .env.example)
  minio:
    image: minio/minio:latest
    container_name: aisaas-minio
    profiles: ["minio"]
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - aisaas_net

  minio-init:
    image: minio/mc:latest
    container_name: aisaas-minio-init
    profiles: ["minio"]
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      i=0;
      until mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\"; do
        i=$$((i+1));
        if [ $$i -gt 30 ]; then exit 1; fi;
        sleep 1;
      done;
      mc mb --ignore-existing local/$${S3_BUCKET};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-aisaas}
    networks:
      - aisaas_net

  web:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: aisaas-web
    restart: unless-stopped
    environment:
      # Browser calls the API via the host-published port.
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    networks:
      - aisaas_net
    depends_on:
      - api

volumes:
  pgdata:
    name: aisaas_pgdata
  redisdata:
    name: aisaas_redisdata
  storage_data:
    name: aisaas_storage
  ollama_data:
    name: aisaas_ollama
  minio_data:
    name: aisaas_minio

networks:
  aisaas_net:
    name: aisaas_net
    driver: bridge
