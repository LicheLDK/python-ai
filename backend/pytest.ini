# Pytest configuration for backend tests (T-1.06 CI-ready)
[pytest]
testpaths = app/tests
python_files = test_*.py
python_functions = test_*
addopts = -q --strict-markers
markers =
    auth: authentication API / service tests
    unit: unit tests (no full HTTP stack required for some)
    api: HTTP API tests (FastAPI TestClient)
    rbac: users/admin RBAC matrix tests
    integration: cross-layer / real-adapter integration tests
filterwarnings =
    # Third-party noise only; our own code warnings still surface.
    ignore::DeprecationWarning:paddle.*
    ignore::DeprecationWarning:paddleocr.*
    ignore:'imghdr' is deprecated.*:DeprecationWarning
    ignore:.*starlette.testclient.*:Warning
