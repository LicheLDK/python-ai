# CI — lint + backend tests + frontend build (T-11.01)
name: ci

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend-tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aisaas
          POSTGRES_PASSWORD: aisaas
          POSTGRES_DB: ai_saas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aisaas -d ai_saas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://aisaas:aisaas@localhost:5432/ai_saas
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-jwt-secret-not-for-production
      CORS_ORIGINS: http://localhost:3000
      STORAGE_PATH: /tmp/aisaas-storage
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt
      - name: Install CI deps (no Paddle)
        run: pip install -r requirements-ci.txt
      - name: Alembic upgrade
        run: python -m alembic upgrade head
      - name: Pytest (skip real Paddle OCR)
        run: >
          python -m pytest
          --ignore=app/tests/unit/test_paddle_ocr.py
          -k "not real_fixture_opencv_paddle"
          --tb=short

  frontend:
    name: frontend-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
